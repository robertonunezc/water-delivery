version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.8
    container_name: water_delivery_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  alloy:
    image: grafana/alloy:latest
    container_name: water_delivery_alloy
    restart: unless-stopped
    env_file:
      - ./.env.production
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    networks:
      - observability


  grafana:
    image: grafana/grafana:10.4.5
    container_name: water_delivery_grafana
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - loki

volumes:
  loki_data:
  grafana_data:

networks:
  observability:
    name: water_delivery_observability