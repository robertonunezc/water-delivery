name: Deploy to VPS
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: water_delivery
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: water_delivery.settings
      SECRET_KEY: dummy-ci-secret-key
      POSTGRES_DB: water_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        working-directory: .
        run: |
          python -m pytest clients
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${{ secrets.EC2_SSH_PORT || '22' }}"
          ssh-keyscan -p "$PORT" -T 10 -H "$HOST" >> ~/.ssh/known_hosts || { echo "keyscan failed"; cat ~/.ssh/known_hosts; exit 1; }
          chmod 644 ~/.ssh/known_hosts
          # Verify the key was created
          ls -la ~/.ssh/
          echo "SSH key setup complete"
      
      - name: Test SSH connection
        run: |
          set -euxo pipefail
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${{ secrets.EC2_SSH_PORT || '22' }}"
          # Verify key still exists
          ls -la ~/.ssh/id_rsa
          ssh -p "$PORT" -o StrictHostKeyChecking=yes -vvv -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}"@"$HOST" "echo 'SSH connection successful'"
      
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "Deploying water-delivery application..."
            cd projects/water-delivery
            
            echo "Creating static and media directories..."
            mkdir -p staticfiles media
            
            echo "Pulling latest code from main branch..."
            git pull origin main
            
            echo "Stopping existing containers..."
            docker-compose -f docker-compose.prod.yml down
            
            echo "Building and starting containers..."
            docker-compose -f docker-compose.prod.yml up -d --build
            
            echo "Collecting static files..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            
            echo "Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            
            echo "Deployment completed successfully!"
          EOF