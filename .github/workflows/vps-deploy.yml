name: Deploy to VPS
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: water_delivery
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: water_delivery.settings
      SECRET_KEY: dummy-ci-secret-key
      POSTGRES_DB: water_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        working-directory: .
        run: |
          python -m pytest clients
  container_healthcheck:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for health check
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: water-delivery:ci-health

      - name: Start dependencies and app container
        run: |
          set -euxo pipefail
          docker network create water-ci-net

          docker run -d --name postgres-ci --network water-ci-net \
            -e POSTGRES_DB=water_delivery \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD="${{ secrets.CI_POSTGRES_PASSWORD }}" \
            postgres:16

          docker run -d --name redis-ci --network water-ci-net redis:7-alpine

          docker run -d --name web-ci --network water-ci-net -p 8000:8000 \
            -e DJANGO_SETTINGS_MODULE=water_delivery.settings \
            -e SECRET_KEY=dummy-ci-secret-key \
            -e POSTGRES_DB=water_delivery \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD="${{ secrets.CI_POSTGRES_PASSWORD }}" \
            -e POSTGRES_HOST=postgres-ci \
            -e POSTGRES_PORT=5432 \
            -e REDIS_HOST=redis-ci \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD= \
            water-delivery:ci-health

      - name: Verify /health/ endpoint in container
        run: |
          set -euxo pipefail
          ATTEMPTS=30
          SLEEP_SECONDS=3

          for i in $(seq 1 "$ATTEMPTS"); do
            if RESPONSE=$(curl -fsS http://localhost:8000/health/); then
              echo "Container health check passed on attempt $i"
              echo "Response: $RESPONSE"
              exit 0
            fi

            echo "Attempt $i/$ATTEMPTS failed, waiting ${SLEEP_SECONDS}s..."
            docker logs web-ci --tail 30 || true
            sleep "$SLEEP_SECONDS"
          done

          echo "Container health check failed after $ATTEMPTS attempts"
          docker logs web-ci || true
          exit 1

      - name: Cleanup containers
        if: always()
        run: |
          set -euxo pipefail
          docker rm -f web-ci redis-ci postgres-ci || true
          docker network rm water-ci-net || true
  build_and_push:
    runs-on: ubuntu-latest
    needs: container_healthcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_REGISTRY_USERNAME }}/development:water
  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      SSH_PORT: ${{ secrets['SSH_PORT'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -T 10 -H "$HOST" >> ~/.ssh/known_hosts || { echo "keyscan failed"; cat ~/.ssh/known_hosts; exit 1; }
          chmod 644 ~/.ssh/known_hosts
          # Verify the key was created
          ls -la ~/.ssh/
          echo "SSH key setup complete"
      
      - name: Test SSH connection
        run: |
          set -euxo pipefail
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${SSH_PORT:-22}"
          # Verify key still exists
          ls -la ~/.ssh/id_rsa
          ssh -p "$PORT" -o StrictHostKeyChecking=yes -vvv -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}"@"$HOST" "echo 'SSH connection successful'"
          
      - name: Deploy to VPS
        run: |
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@$HOST" << 'EOF'
            set -euo pipefail
            echo "Deploying water-delivery application..."
            cd projects/water-delivery
            
            echo "Creating static and media directories..."
            mkdir -p staticfiles media
            
            # Pull immutable image
            docker-compose -f docker-compose.prod.yml pull web celery-worker celery-beat
            
            echo "Stopping existing containers..."
            docker-compose -f docker-compose.prod.yml down
            
            echo "Building and starting containers..."
            docker-compose -f docker-compose.prod.yml up -d web celery-worker celery-beat postgres redis
            
            echo "Collecting static files..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            
            echo "Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            
            # Optional: show running image
            docker-compose -f docker-compose.prod.yml ps

            echo "Running post-deploy health check..."
            HEALTHCHECK_URL="http://localhost:8001/health/"
            ATTEMPTS=12
            SLEEP_SECONDS=5

            for i in $(seq 1 "$ATTEMPTS"); do
              if RESPONSE=$(curl -fsS "$HEALTHCHECK_URL"); then
                echo "Health check passed on attempt $i"
                echo "Response: $RESPONSE"
                break
              fi

              if [ "$i" -eq "$ATTEMPTS" ]; then
                echo "Health check failed after $ATTEMPTS attempts"
                exit 1
              fi

              echo "Health check attempt $i/$ATTEMPTS failed. Retrying in ${SLEEP_SECONDS}s..."
              sleep "$SLEEP_SECONDS"
            done
            
            echo "Deployment completed successfully!"

          EOF

  notify:
    runs-on: ubuntu-latest
    needs: [test, container_healthcheck, build_and_push, deploy]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          status_label() {
            case "$1" in
              success) echo "OK" ;;
              failure) echo "FAIL" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "SKIPPED" ;;
              *) echo "UNKNOWN" ;;
            esac
          }

          OVERALL="SUCCESS"
          for result in "${{ needs.test.result }}" "${{ needs.container_healthcheck.result }}" "${{ needs.build_and_push.result }}" "${{ needs.deploy.result }}"; do
            if [ "$result" != "success" ]; then
              OVERALL="FAILED"
              break
            fi
          done

          MESSAGE=$(printf '%s\n' \
            "<b>Water Delivery Deployment ${OVERALL}</b>" \
            "" \
            "<b>Repository:</b> ${{ github.repository }}" \
            "<b>Branch:</b> ${{ github.ref_name }}" \
            "<b>Actor:</b> ${{ github.actor }}" \
            "<b>Commit:</b> <code>${{ github.sha }}</code>" \
            "" \
            "<b>Jobs:</b>" \
            "- test: $(status_label '${{ needs.test.result }}')" \
            "- container_healthcheck: $(status_label '${{ needs.container_healthcheck.result }}')" \
            "- build_and_push: $(status_label '${{ needs.build_and_push.result }}')" \
            "- deploy: $(status_label '${{ needs.deploy.result }}')" \
            "" \
            "<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View workflow run</a>"
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}"