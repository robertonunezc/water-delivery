name: Build and Deploy to AWS ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to ECR
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:$IMAGE_TAG"
        echo "Building $IMAGE"
        docker build -t $IMAGE .
        docker push $IMAGE
        echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

    - name: Render ECS task definition
      id: render-task-def
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        sed "s|<IMAGE>|${IMAGE_URI}|g" .github/ecs/task-definition.json \
          | sed "s|<EXECUTION_ROLE_ARN>|${{ secrets.ECS_EXECUTION_ROLE_ARN }}|g" \
          | sed "s|<TASK_ROLE_ARN>|${{ secrets.ECS_TASK_ROLE_ARN }}|g" \
          | sed "s|<DJANGO_SECRET_ARN>|${{ secrets.DJANGO_SECRET_ARN }}|g" \
          | sed "s|<POSTGRES_PASSWORD_ARN>|${{ secrets.POSTGRES_PASSWORD_ARN }}|g" \
          | sed "s|<AWS_REGION>|${AWS_REGION}|g" \
          > task-def-rendered.json

    - name: Show rendered task definition (trimmed)
      run: |
        echo "--- task-def-rendered.json ---"
        jq . task-def-rendered.json | sed -n '1,120p'

    - name: Register ECS task definition
      id: register-task-def
      run: |
        aws ecs register-task-definition --cli-input-json file://task-def-rendered.json

    - name: Deploy to ECS service
      run: |
        SERVICE_NAME=${{ secrets.ECS_SERVICE }}
        CLUSTER_NAME=${{ secrets.ECS_CLUSTER }}
        aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --force-new-deployment
