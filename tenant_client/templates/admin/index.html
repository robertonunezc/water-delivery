{% load i18n static %}

{% block content %}

                <span>Multi-Tenant Management</span>
            </div>
        </caption>
        <tbody>
            <tr class="model-clienttenant">
                <th scope="row">
                    <a href="{% url 'tenant_client:list' %}" style="font-weight: 600;">
                        Tenant Management Dashboard
                    </a>
                </th>
                <td>
                    <a href="{% url 'tenant_client:list' %}" class="viewlink" title="View all tenants">
                        View Tenants
                    </a>
                </td>
                <td>
                    <a href="{% url 'tenant_client:create' %}" class="addlink" title="Create new tenant">
                        Create Tenant
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<style>
    .module caption {
        background-color: #79aec8;
        color: #fff;
        padding: 10px;
        font-weight: 600;
    }
    .module table tbody tr:hover {
        background-color: #f5f5f5;
    }
</style>
{% endif %}
{% endblock %}
