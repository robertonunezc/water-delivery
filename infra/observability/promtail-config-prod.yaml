server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: https://logs-prod-021.grafana.net/loki/api/v1/push
    basic_auth:
      username: ""
      password_file: /etc/promtail/api_key

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: docker_containers
    static_configs:
      - targets: ['localhost']
        labels:
          job: docker
          env: prod
          __path__: /var/lib/docker/containers/*/*-json.log
    relabel_configs:
      - source_labels: ['__path__']
        regex: '.*/([^/]+)-json.log'
        target_label: 'container_id'
      # optional: extract container name via docker label if available
    pipeline_stages:
      - docker: {}