version: '3.8'

services:

  web:
    image: robe/development:water
    container_name: water_delivery_web_prod
    restart: unless-stopped
    env_file:
      - /etc/water-delivery/.env
    environment:
      - ENV=prod
      - DEBUG=false
      - DJANGO_SETTINGS_MODULE=water_delivery.settings_production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=web"

  celery-worker:
    image: robe/development:water
    container_name: water_delivery_celery_worker_prod
    restart: unless-stopped
    env_file:
      - /etc/water-delivery/.env
    environment:
      - ENV=prod
      - DEBUG=false
      - DJANGO_SETTINGS_MODULE=water_delivery.settings_production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: celery -A water_delivery worker -l info
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-worker"

  celery-beat:
    image: robe/development:water
    container_name: water_delivery_celery_beat_prod
    restart: unless-stopped
    env_file:
      - /etc/water-delivery/.env
    environment:
      - ENV=prod
      - DEBUG=false
      - DJANGO_SETTINGS_MODULE=water_delivery.settings_production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: celery -A water_delivery beat -l info
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-beat"

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_prod
    restart: unless-stopped
    env_file:
      - /etc/water-delivery/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: water_delivery_redis_prod
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=redis"
    restart: unless-stopped
    env_file:
      - /etc/water-delivery/.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
volumes:
  postgres_data:
  redis_data: