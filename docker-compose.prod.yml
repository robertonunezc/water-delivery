version: '3.8'

services:

  web:
    image: robe/development:water
    container_name: purigest_web_prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./.env.production
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    # Expose port internally only - nginx will proxy
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=purigest"
      - "environment=production"
      - "service=web"

  celery-worker:
    image: robe/development:water
    container_name: purigest_celery_worker_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    command: celery -A water_delivery worker -l info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3" 
    depends_on:
      - postgres
      - redis
    labels:
      - "project=purigest"
      - "environment=production"
      - "service=celery-worker"

  celery-beat:
    image: robe/development:water
    container_name: purigest_celery_beat_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    
    command: celery -A water_delivery beat -l info
    depends_on:
      - postgres
      - redis
    labels:
      - "project=purigest"
      - "environment=production"
      - "service=celery-beat"

  postgres:
    image: postgres:16
    container_name: purigest_postgres_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    labels:
      - "project=purigest"
      - "environment=production"
      - "service=postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: purigest_redis_prod
    labels:
      - "project=purigest"
      - "environment=production"
      - "service=redis"
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  postgres_data:
  redis_data: