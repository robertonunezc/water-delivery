version: '3.8'

services:

  web:
    image: robe/development:water
    container_name: water_delivery_web_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=False
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=web"

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=redis"
volumes:
  postgres_data:
  redis_data: