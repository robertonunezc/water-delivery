version: '3.8'

services:

  web:
    build: .
    container_name: water_delivery_web_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=False
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=web"

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  # nginx:
  #   image: nginx:alpine
  #   container_name: water_delivery_nginx_prod
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - static_volume:/app/staticfiles
  #     - media_volume:/app/media
  #   depends_on:
  #     - web
  #   labels:
  #     - "project=water-delivery"
  #     - "environment=production"
  #     - "service=nginx"
  
  promtail:
    image: grafana/promtail:latest
    container_name: promtail_prod
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      - PROMTAIL_LOKI_API_KEY
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/observability/promtail-config-prod.yaml:/etc/promtail/promtail-config.yaml:ro
    command: /bin/sh -c "echo ${PROMTAIL_LOKI_API_KEY} > /etc/promtail/api_key && /usr/bin/promtail -config.file=/etc/promtail/promtail-config.yaml"
    depends_on:
      - web
volumes:
  postgres_data:
  redis_data: