version: '3.8'

services:

  web:
    image: robe/development:water
    container_name: water_delivery_web_prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./.env.production
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    # Expose port internally only - nginx will proxy
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=web"

  celery-worker:
    image: robe/development:water
    container_name: water_delivery_celery_worker_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    command: celery -A water_delivery worker -l info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3" 
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-worker"

  celery-beat:
    image: robe/development:water
    container_name: water_delivery_celery_beat_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    
    command: celery -A water_delivery beat -l info
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-beat"

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_prod
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: water_delivery_redis_prod
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=redis"
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  nginx:
    image: nginx:alpine
    container_name: water_delivery_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - web
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=nginx"

  certbot:
    image: certbot/certbot
    container_name: water_delivery_certbot_prod
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

  celery-worker:
    build: .
    container_name: water_delivery_celery_worker_prod
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A water_delivery worker -l info
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - web
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-worker"

  celery-beat:
    build: .
    container_name: water_delivery_celery_beat_prod
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A water_delivery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - web
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=celery-beat"
  
  # promtail:
  #   image: grafana/promtail:latest
  #   container_name: promtail_prod
  #   restart: unless-stopped
  #   env_file: 
  #     - .env
  #   environment:
  #     - PROMTAIL_LOKI_API_KEY
  #   volumes:
  #     - /var/lib/docker/containers:/var/lib/docker/containers:ro
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
