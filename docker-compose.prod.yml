version: '3.8'

services:

  web:
    build: .
    container_name: water_delivery_web_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=water_delivery.settings_production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=web"

  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=postgres"
      - postgres_data:/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  nginx:
    image: nginx:alpine
    container_name: water_delivery_nginx_prod
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    labels:
      - "project=water-delivery"
      - "environment=production"
      - "service=nginx"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: