{% extends 'base.html' %}

{% block extra_css %}
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
{% endblock %}


{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <i class="fas fa-lock fa-5x text-warning mb-4"></i>
        <h2 class="text-danger">Acceso Denegado</h2>
        <p class="lead text-muted">
          No tienes permiso para ver esta ruta.
        </p>
        <p class="text-muted">
          Solo puedes ver las rutas que te han sido asignadas.
        </p>
        <div class="mt-4">
          <a href="{% url 'routes:list' %}" class="btn btn-primary me-2">
            <i class="fas fa-arrow-left"></i> Volver a Mis Rutas
          </a>
          <a href="{% url 'core:home' %}" class="btn btn-outline-secondary">
            <i class="fas fa-home"></i> Ir al Inicio
          </a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
