{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
  <div class="unfold-container" style="max-width: 720px; margin: 0 auto;">
    <div class="unfold-card" style="padding: 20px; background: var(--uf-surface, #fff); border: 1px solid var(--uf-border, #e5e7eb); border-radius: 10px; box-shadow: var(--uf-shadow-sm, 0 1px 2px rgba(0,0,0,0.05));">
      <h1 style="margin-top: 0; margin-bottom: 16px;">{{ title }}</h1>

      {% if product %}
        <p style="margin-bottom: 12px;"><strong>Producto:</strong> {{ product.name }} ({{ product.presentation }}) ${{ product.price }}</p>
      {% else %}
        <p style="color: #b91c1c; margin-bottom: 12px;">Debe seleccionar un producto.</p>
      {% endif %}

      <form action="{% url 'admin:product_bulk_update_prices' %}" method="post" novalidate>
        {% csrf_token %}
        <div class="unfold-form" style="display: grid; gap: 12px;">
          {{ form.as_p }}
        </div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button type="submit" class="bg-primary-600 block border border-transparent cursor-pointer font-medium px-3 py-2 rounded-default text-white w-full lg:w-auto" style="padding: 8px 14px;">Aplicar incremento</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
