version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: water_delivery_postgres_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    labels:
      - "project=water-delivery"
      - "environment=development"
      - "service=postgres"
      - postgres_data:/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: water_delivery_redis_dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  promtail:
    image: grafana/promtail:latest
    env_file:
      - .env
    environment:
      PROMTAIL_LOKI_API_KEY: ${PROMTAIL_LOKI_API_KEY}
    volumes:
      - ./logs:/var/log/water_delivery:ro
      - ./infra/observability/promtail-config-dev.yaml:/etc/promtail/promtail-config.yaml:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo -n \"$PROMTAIL_LOKI_API_KEY\" > /etc/promtail/api_key &&
      ls -l /etc/promtail &&
      /usr/bin/promtail -config.file=/etc/promtail/promtail-config.yaml"
    labels:
      - "project=water-delivery"
      - "environment=development"
      - "service=promtail"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  promtail_data: